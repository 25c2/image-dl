<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Auto Downloader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="popup-shell">
  <main class="popup-grid">
    <section class="card">
      <div class="status-line">
        <div>
          <p class="eyebrow">Quick Control</p>
          <h1>画像ダウンローダー</h1>
        </div>
        <span id="popup-badge" class="badge">読み込み中</span>
      </div>

      <label class="toggle">
        <input id="popup-enabled" type="checkbox" />
        <span>この拡張を有効化</span>
      </label>

      <p id="popup-summary" class="muted">状態を取得中…</p>
    </section>

    <section class="card">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Watch Sizes</p>
          <h2>登録サイズ</h2>
        </div>
      </div>
      <div id="popup-sizes" class="size-chip-list"></div>
    </section>

    <section class="card">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Actions</p>
          <h2>すぐ使う操作</h2>
        </div>
      </div>
      <div class="button-row">
        <button id="popup-rescan" class="secondary" type="button">このページを再確認</button>
        <button id="popup-options" class="ghost" type="button">詳細設定を開く</button>
      </div>
      <p id="popup-message" class="feedback muted">アイコンからだいたい済むようにしたわ。</p>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
